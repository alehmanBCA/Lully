{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Edit Account — Lully</title>
  <link rel="stylesheet" href="{% static 'css/profile.css' %}">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="top-left">
        <div class="logo-row">
          <div class="logo-mark">
            <img src="{% static 'images/Lully_logo.png' %}" alt="Lully Logo" class="logo-img">
          </div>
          <div class="title-block">
            <h1>Edit Account</h1>
            <p class="subtitle">Update your display name and profile picture</p>
          </div>
        </div>
      </div>
    </header>

    <main class="content">
      <section class="edit-account">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="form-row">
            <label for="name">Display name</label>
            <input id="name" name="name" type="text" value="{{ name }}">
          </div>

          <div class="form-row">
            <label for="pfp">Profile picture</label>
            {% if profile_url %}
              <div class="current-pfp">
                <img src="{{ profile_url }}" alt="current pfp" style="max-width:80px; border-radius:50%;">
              </div>
            {% endif %}
            <input id="pfp" name="pfp" type="file" accept="image/*">
          </div>

          <div class="form-actions">
            <button type="submit" class="btn">Save</button>
            <a href="{% url 'profile' %}" class="btn btn-link">Cancel</a>
          </div>
        </form>
      </section>
    </main>
  </div>
</body>
</html>
