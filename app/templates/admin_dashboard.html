{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Dashboard — Lully</title>
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>
<body class="dashboard-page">
  <main class="dashboard-shell">
    <header class="landing-nav">
      <a class="brand-mark" href="{% url 'home' %}">
        <img src="{% static 'images/logo.png' %}" alt="Lully logo" class="brand-logo">
        <span class="brand-copy"><strong>Lully</strong></span>
      </a>
      <div class="landing-actions">
        <a class="nav-link" href="{% url 'profile' %}">Profile</a>
      </div>
    </header>

    <section style="max-width:900px;margin:28px auto;padding:20px;">
      <h1>Admin Dashboard</h1>
      <p>Welcome, site admin. This page is a placeholder for admin tools (user management, site settings, etc.).</p>

      <div style="margin-top:18px;">
        <ul>
          <li><a href="{% url 'home' %}">Back to Home</a></li>
          <li><a href="{% url 'profile' %}">View Profile</a></li>
          <li><a href="{% url 'admin_users' %}">Manage Users</a></li>
        </ul>
      </div>
    </section>

    <footer class="page-footer">© 2026 Lully</footer>
  </main>
</body>
</html>
