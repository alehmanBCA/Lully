{% load static %}
<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{% static 'css/monitor.css' %}">
</head>
<body>
    <div class="monitor-container">
        <header class="monitor-header">
            <div class="baby-meta">
                <h2>Monitoring {{ baby.name }}</h2>
                <span class="status-tag online">● Live Connection</span>
            </div>
        </header>

        <div class="vitals-grid">
            <div class="vital-card hr">
                <h3>Heart Rate</h3>
                <div class="value-row">
                    <span id="live-hr" class="large-val">--</span>
                    <span class="unit">BPM</span>
                </div>
                <div class="pulse-icon">❤️</div>
            </div>

            <div class="vital-card temp">
                <h3>Temperature</h3>
                <div class="value-row">
                    <span id="live-temp" class="large-val">--</span>
                    <span class="unit">°F</span>
                </div>
                <div class="pulse-icon">🌡️</div>
            </div>
        </div>
    </div>

    <script>
        // These constants tell app.js where to find your Node.js mock server
        // Prefer the Django backend endpoint so UI and server-side
        // notifications stay in sync. The Node mock server can still be
        // used for local testing by setting HR_API_URL/TEMP_API_URL to the
        // mock endpoints, but by default we point to the Django view.
        const CURRENT_BABY_ID = {{ baby.id }};
        const HR_API_URL = `/api/baby/${CURRENT_BABY_ID}/vitals/`;
        const TEMP_API_URL = `/api/baby/${CURRENT_BABY_ID}/vitals/`;
    </script>
    <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
