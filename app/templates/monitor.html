{% load static %}
<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{% static 'css/monitor.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="monitor-container">
        <header class="monitor-header">
            <div class="baby-meta">
                <h1>{{ baby.name }}</h1>
                <div class="status-pill">
                    <span class="status-dot"></span>
                    <span id="connection-status">Live Connection</span>
                </div>
            </div>
        </header>

        <div class="vitals-grid">
            <div class="vital-card hr">
                <div class="card-header">
                    <h3>Heart Rate</h3>
                    <span class="icon">❤️</span>
                </div>
                <div class="value-row">
                    <span id="live-hr" class="large-val">--</span>
                    <span class="unit">BPM</span>
                </div>
            </div>

            <div class="vital-card temp">
                <div class="card-header">
                    <h3>Temperature</h3>
                    <span class="icon">🌡️</span>
                </div>
                <div class="value-row">
                    <span id="live-temp" class="large-val">--</span>
                    <span class="unit">°F</span>
                </div>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-header">
                <h3>Heart Rate History</h3>
                <span class="time-range">Last 20 readings</span>
            </div>
            <canvas id="hrChart"></canvas>
        </div>
    </div>

    <script>
        const VITALS_API_URL = "{% url 'api_vitals' baby.id %}";
       
    </script>
    <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
