{% load static %}
<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{% static 'css/monitor.css' %}">
</head>
<body>
    <div class="monitor-container">
        <header class="monitor-header">
            <div class="baby-meta">
                <h2>Monitoring {{ baby.name }}</h2>
                <span class="status-tag online">● Live Connection</span>
            </div>
        </header>

        <div class="vitals-grid">
            <div class="vital-card hr">
                <h3>Heart Rate</h3>
                <div class="value-row">
                    <span id="live-hr" class="large-val">--</span>
                    <span class="unit">BPM</span>
                </div>
                <div class="pulse-icon">❤️</div>
            </div>

            <div class="vital-card temp">
                <h3>Temperature</h3>
                <div class="value-row">
                    <span id="live-temp" class="large-val">--</span>
                    <span class="unit">°F</span>
                </div>
                <div class="pulse-icon">🌡️</div>
            </div>
        </div>
    </div>

    <script>
        // These constants tell app.js where to find your Node.js mock server
        const HR_API_URL = "http://127.0.0.1:3000/api/hr";
        const TEMP_API_URL = "http://127.0.0.1:3000/api/temperature";
    </script>
    <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
